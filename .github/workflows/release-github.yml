#
# Create a GitHub Release manually (sdist/wheel assets), for an existing version tag.
# PyPI can still be published via publish-pypi.yml (e.g. on tag push or manual run).

name: Release on GitHub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish (e.g. v0.1.23)
        type: string
        required: true
      with_web:
        description: Run npm build in web/ and scripts/prepare_web_dist.py before packaging
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node (for optional web build)
        if: ${{ inputs.with_web == true }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Parse version from pyproject.toml
        id: version
        run: |
          VERSION="$(grep -E '^version[[:space:]]*=' pyproject.toml | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not parse version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pyproject version
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [[ "${TAG}" != v* ]]; then
            echo "Tag must start with v (got: ${TAG})" >&2
            exit 1
          fi
          TAG_VER="${TAG#v}"
          if [[ "${TAG_VER}" != "${EXPECTED}" ]]; then
            echo "Tag version (${TAG_VER}) does not match pyproject.toml version (${EXPECTED})" >&2
            exit 1
          fi

      - name: Build web assets (optional)
        if: ${{ inputs.with_web == true }}
        run: |
          set -euo pipefail
          (cd web && npm ci --no-progress && npm run build -- --logLevel warn)
          python scripts/prepare_web_dist.py

      - name: Clean and build sdist/wheel
        run: |
          set -euo pipefail
          rm -rf dist build
          mkdir -p dist
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: fairyclaw ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
