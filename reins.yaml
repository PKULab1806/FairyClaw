budgets:
  # Global daily budget config used by Reins budget engine.
  daily: $100.00
  on_exceed: reject
  agents:
    fairyclaw_runtime:
      daily: $100.00
      on_exceed: reject

modules:
  budget:
    enabled: true
  trace:
    enabled: true

storage: duckdb
storage_path: ./.reins/reins.duckdb
retention_days: 90
