# Legacy memory_extraction.py runs only when extraction_mode is heuristic.
# Use hybrid only if the manifest points at hybrid_memory_extraction.py.
extraction_mode: heuristic

# Chat profile names from config/llm_endpoints.yaml (must be type chat, not embedding).
extraction_profile: compaction_summarizer
# Used when query_summarize_tool_results is true (optional LLM pass for retrieval query text).
compaction_profile: compaction_summarizer

# Retrieval query: long tool/user lines in llm_messages. Default is truncation only so we do not
# stack an extra LLM call on top of compression_hooks (which already char-clamps tool results when compressing).
query_summarize_tool_results: false
query_tool_char_threshold: 800
query_tool_truncate_chars: 400

embedding_profile: embedding
vectorstore_path: ./data/vectorstore
collection_name: fairyclaw_memory

recent_n_messages: 5
similar_m_messages: 3

# Used only by legacy memory_pre_context.py if you point the manifest at that script.
compaction_max_history_items: 120
compaction_min_history_items: 12
summary_char_limit: 1500
